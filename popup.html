<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B站话题分析器</title>
  <link rel="stylesheet" href="styles/popup.css">
</head>
<body>
  <div class="popup-container">
    <header class="header">
      <h1>📊 B站话题分析器</h1>
    </header>
    
    <main class="main">
      <section class="section">
        <h2>使用说明</h2>
        <ol class="instructions">
          <li>打开 <a href="https://search.bilibili.com" target="_blank">B站搜索页面</a></li>
          <li>搜索你感兴趣的关键词</li>
          <li>点击页面右下角的 📊 按钮</li>
          <li>选择采集范围并开始采集</li>
        </ol>
      </section>
      
      <section class="section">
        <h2>功能特性</h2>
        <ul class="features">
          <li>✅ 单页/多页/随机采样采集</li>
          <li>✅ 渐进式采集 + 实时进度</li>
          <li>✅ 数据缓存（10分钟）</li>
          <li>✅ CSV 导出</li>
          <li>🔲 数据分析面板（开发中）</li>
          <li>🔲 AI 语义分析（规划中）</li>
        </ul>
      </section>
      
      <section class="section">
        <h2>数据管理</h2>
        <div class="actions">
          <button id="clear-cache" class="btn btn-secondary">清除所有缓存</button>
        </div>
      </section>
    </main>
    
    <footer class="footer">
      <p>版本 1.0.0</p>
    </footer>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
