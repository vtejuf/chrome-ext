<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B站金铲子</title>
  <link rel="stylesheet" href="styles/popup.css">
</head>

<body>
  <div class="popup-container">
    <header class="header">
      <h1>📊 B站金铲子</h1>
    </header>

    <main class="main">
      <section class="section">
        <h2>使用说明</h2>
        <ol class="instructions">
          <li>打开 <a href="https://search.bilibili.com" target="_blank">B站搜索页面</a></li>
          <li>搜索你感兴趣的关键词</li>
          <li>点击页面右下角的 📊 按钮</li>
          <li>选择采集范围并开始采集</li>
        </ol>
      </section>

      <section class="section">
        <h2>功能特性</h2>
        <ul class="features">
          <li>✅ 单页/多页/随机采样采集</li>
          <li>✅ 渐进式采集 + 实时进度</li>
          <li>✅ 数据缓存（10分钟）</li>
          <li>✅ CSV 导出</li>
          <li>✅ AI 语义分析</li>
        </ul>
      </section>

      <section class="section">
        <h2>🤖 AI 配置</h2>
        <p style="font-size: 12px; color: #666; margin-bottom: 12px;">配置后可一键调用 AI 分析，不配置也可使用「复制指令」粘贴到网页 AI</p>
        <div class="form-group">
          <label for="ai-endpoint">API 端点</label>
          <input type="text" id="ai-endpoint" placeholder="https://api.openai.com/v1/chat/completions" />
        </div>
        <div class="form-group">
          <label for="ai-key">API Key</label>
          <input type="password" id="ai-key" placeholder="sk-..." />
        </div>
        <div class="form-group">
          <label for="ai-model">模型</label>
          <input type="text" id="ai-model" placeholder="gpt-3.5-turbo" value="gpt-3.5-turbo" />
        </div>
        <div class="actions">
          <button id="save-ai-config" class="btn btn-primary">保存配置</button>
        </div>
      </section>

      <section class="section">
        <h2>数据管理</h2>
        <div class="actions">
          <button id="clear-cache" class="btn btn-secondary">清除所有缓存</button>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>版本 1.0.0</p>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>

</html>
